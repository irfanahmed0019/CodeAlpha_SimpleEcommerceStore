{% extends 'auth_base.html' %}
{% load static %}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}
<!-- Auth Card -->
<div class="login-card bg-surface-container-lowest w-full max-w-[360px] p-stack-lg rounded-lg">
<h1 class="font-headline-md text-headline-md mb-stack-md text-on-surface">Sign in or create account</h1>
<!-- Identification Form -->
<form method="POST" class="space-y-stack-md">{% csrf_token %}
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email</label>
<input class="w-full px-stack-md py-stack-sm border border-outline-variant rounded-lg font-body-md text-on-surface bg-surface-container-lowest transition-all focus:border-primary-container" id="email" name="email" placeholder="Enter your email address" required="" type="email">
</div>
<button class="w-full bg-primary-container text-on-primary-container py-3 rounded-lg font-label-md font-bold cursor-pointer transition-all duration-200 hover:opacity-90 active:scale-[0.98]" type="submit">
                    Continue
                </button>
<p class="font-body-sm text-body-sm text-on-surface-variant text-center mt-stack-sm">
                    By continuing, you agree to #Store's <a class="text-primary hover:underline" href="#">Conditions of Use</a> and <a class="text-primary hover:underline" href="#">Privacy Notice</a>.
                </p>
</form>
<!-- Divider -->
<div class="relative flex py-stack-lg items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 text-on-surface-variant font-label-sm text-label-sm">OR</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Provider -->
<button class="w-full flex items-center justify-center gap-stack-sm border border-outline-variant py-stack-sm rounded-lg font-label-md text-on-surface hover:bg-surface-container transition-colors cursor-pointer">
<!-- SVG Google Icon (Simplified) -->
{% load socialaccount %}

<a href="{% provider_login_url 'google' %}"
   class="w-full flex items-center justify-center gap-stack-sm border border-outline-variant py-stack-sm rounded-lg hover:bg-surface-container transition-colors">

    <!-- Google SVG -->
    <svg height="18" viewBox="0 0 18 18" width="18">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.48h4.84c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.688-3.874 2.688-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.71H.957v2.332A9 9 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.708A5.41 5.41 0 013.68 9c0-.593.102-1.17.284-1.708V4.96H.957A9 9 0 000 9c0 1.452.348 2.827.957 4.04l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.58-2.58C13.891.891 11.426 0 9 0 5.483 0 2.443 2.017.957 4.96l3.007 2.332C4.672 5.164 6.656 3.58 9 3.58z" fill="#EA4335"/>
    </svg>

    <span>Continue with Google</span>

</a>
<!-- Secondary CTA -->
<div class="mt-stack-lg pt-stack-md border-t border-outline-variant">
</a>

</div>
</div>
<!-- Atmospheric Visual Element (Non-intrusive) -->
<div class="mt-stack-lg max-w-[360px] w-full px-4 text-center opacity-40">

</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/login.js' %}"></script>
{% endblock %}
